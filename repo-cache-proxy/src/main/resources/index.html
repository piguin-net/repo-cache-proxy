<html>
    <head>
        <meta charset="UTF-8">
        <style>
            body {
                margin: 0;
            }
            dt {
                margin-inline-start: 30px;
            }
            dd {
                margin-inline-start: 60px;
            }
            details:hover {
                background-color: lightblue;
            }
            details > summary {
                cursor: zoom-in;
                list-style: none;
            }
            details:open > summary {
                cursor: zoom-out;
            }
            details > summary  a {
                cursor: pointer;
            }
            details > summary > form {
                display: inline;
            }
            header {
                position: sticky;
                top: 0;
                background-color: white;
            }
            header > a {
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <header>
            <input id="select-all" title="select" type="checkbox">
            <a id="download-all" title="download">⬇️</a>
            <a id="delete-all" title="delete">🗑️</a>
            <label id="total-size"></label>
            <hr>
        </header>
        <main></main>
        <footer></footer>
        <script>
            var container = document.querySelector('main');

            document.querySelector('#select-all').addEventListener('click', event => {
                container.querySelectorAll('input[type="checkbox"]').forEach(el => {
                    el.checked = event.target.checked;
                });
            });

            document.querySelector('#download-all').addEventListener('click', event => {
                alert('TODO: 実装');
            });

            document.querySelector('#delete-all').addEventListener('click', event => {
                var items = Array.from(container.querySelectorAll('input[type="checkbox"]:checked'));
                Promise.all(items.map(el => fetch(el.value, {method: "DELETE"}))).catch((e) => {
                    console.error(e);
                    alert('error.');
                }).finally(() => {
                    container.innerHTML = '';
                    load(container);
                });
            });

            var load = (container) => {
                fetch(
                    'metadata'
                ).then(
                    res => res.json()
                ).then(
                    json => {
                        if (Object.keys(json).length == 0) {
                            alert('not cached.');
                            return;
                        }
                        var totalSize = Object.values(json)
                            .map(attr => attr['Content-Length'])
                            .reduce((total, size) => total + size);
                        var label = document.querySelector('#total-size');
                        label.textContent = `total size: ${totalSize.toLocaleString()}Byte`;
                        Object.entries(json).forEach(([path, attr]) => {
                            var checkbox = document.createElement('input');
                            checkbox.title = 'select';
                            checkbox.type = 'checkbox';
                            checkbox.value = path;
                            checkbox.addEventListener('click', event => {
                                document.querySelector('#select-all').checked = Array.from(
                                    container.querySelectorAll('input[type="checkbox"]')
                                ).every(
                                    el => el.checked
                                );
                            });
                            var download = document.createElement('a');
                            download.title = 'download';
                            download.innerText = '⬇️';
                            download.href = path;
                            download.target = '_blank';
                            var trush = document.createElement('a');
                            trush.title = 'delete';
                            trush.innerText = '🗑️';
                            trush.onclick = 'this.parent.submit()';
                            trush.addEventListener('click', (event) => {
                                event.stopPropagation();
                                fetch(path, {method: "DELETE"}).catch((e) => {
                                    console.error(e);
                                    alert('error.');
                                }).finally(() => {
                                    container.innerHTML = '';
                                    load(container);
                                });
                            });
                            var progress = document.createElement('progress');
                            progress.max = totalSize;
                            progress.value = attr['Content-Length'];
                            progress.title = `${attr['Content-Length'].toLocaleString()}Byte(${Math.round(attr['Content-Length'] *  10000 / totalSize) / 100}%)`;
                            var summary = document.createElement('summary');
                            summary.append(checkbox);
                            summary.append(download);
                            summary.append(trush);
                            summary.append(progress);
                            summary.append(path);
                            var details = document.createElement('details');
                            details.append(summary);
                            Object.entries(attr).forEach(([key, value]) => {
                                var dt = document.createElement('dt');
                                var dd = document.createElement('dd');
                                dt.innerText = key;
                                dd.innerText = value;
                                details.append(dt);
                                details.append(dd);
                            });
                            details.addEventListener('toggle', event => {
                                document.querySelectorAll('details:open').forEach(el => {
                                    if (event.target.open && el != event.target) {
                                        el.open = false;
                                    }
                                });
                            });
                            container.append(details);
                        });
                    }
                ).catch((e) => {
                    console.error(e);
                    alert('error.');
                });
            };

            load(container);
        </script>
    </body>
</html>
